name: Build and deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Dalamud reference assemblies. Your in-game Dalamud is API 15 / net10
      # (staging) -- match it. Switch to .../latest.zip on the release channel.
      - name: Download Dalamud
        shell: pwsh
        run: |
          $dev = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dev | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dev -Force

      - name: Build
        run: dotnet build src/FrenMits.csproj -c Release --nologo

      # Public Pages site: the plugin zip + the custom-repo manifest.
      - name: Assemble Pages site
        shell: pwsh
        run: |
          $out = "src\bin\x64\Release"
          if (-not (Test-Path "$out\FrenMits.dll")) { $out = "src\bin\Release" }
          New-Item -ItemType Directory -Force -Path "site" | Out-Null
          # Plugin + manifest + bundled NAudio assemblies (for online-voice playback).
          $files = @("$out\FrenMits.dll", "$out\FrenMits.json")
          $files += (Get-ChildItem "$out\NAudio*.dll" | ForEach-Object { $_.FullName })
          Compress-Archive -Path $files -DestinationPath "site\FrenMits.zip" -Force
          Copy-Item "repo.json" "site\repo.json" -Force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
