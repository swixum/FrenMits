name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Dalamud reference assemblies. Your in-game Dalamud is API 15 / net10
      # (staging) -- match it. Switch to .../latest.zip on the release channel.
      - name: Download Dalamud
        shell: pwsh
        run: |
          $dev = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dev | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dev -Force

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Package
        shell: pwsh
        run: |
          $out = "bin\x64\Release"
          if (-not (Test-Path "$out\FrenMits.dll")) { $out = "bin\Release" }
          New-Item -ItemType Directory -Force -Path "dist\FrenMits" | Out-Null
          Copy-Item "$out\FrenMits.dll","$out\FrenMits.json" "dist\FrenMits" -Force

      # Download this from the run's Artifacts, unzip, and point Dalamud's
      # Dev Plugin Locations at the FrenMits folder inside it.
      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: FrenMits-plugin
          path: dist/FrenMits
